*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}

html,body{margin:0;padding:0;background:var(--bg);color:var(--text);

a{color:inherit;text-decoration:none;}

#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;

  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;padding-top:6px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:5px 4px;width:100%;cursor:pointer;border-radius:8px;transition:background .2s;}
.sb-item:hover{background:rgba(184,134,11,.14);}
.sb-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:1.5px solid rgba(212,196,168,.4);font-family:"Noto Sans TC",sans-serif;
  font-size:15px;font-weight:600;color:var(--sbText);transition:all .2s;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;letter-spacing:.5px;
  color:var(--sbText);opacity:.82;text-align:center;line-height:1.3;}
.sb-item.active .sb-circle{background:var(--gold);border-color:var(--goldL);color:#1e1a14;
  box-shadow:0 0 12px rgba(184,134,11,.6);}
.sb-item.active .sb-label{color:var(--goldL);opacity:1;}

#sbToggle{display:none;position:fixed;left:14px;top:14px;z-index:130;
  width:42px;height:42px;border-radius:8px;background:var(--sbBg);color:var(--gold);
  border:1px solid rgba(184,134,11,.4);font-size:20px;cursor:pointer;}

.main{margin-left:var(--sbW);}

.site-hero{position:relative;background:var(--headGrad);color:#f7f3ec;text-align:center;
  padding:72px 28px 60px;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:280px;font-weight:900;color:rgba(212,168,75,.04);white-space:nowrap;pointer-events:none;letter-spacing:20px;}
.hero-inner{position:relative;z-index:1;max-width:880px;margin:0 auto;}
.hero-title{font-size:56px;font-weight:900;color:var(--goldL);margin:0 0 18px;letter-spacing:6px;}
.hero-subtitle{font-size:20px;color:#e8ddc8;margin:0 0 10px;letter-spacing:3px;}
.hero-meta{font-size:18px;color:#c9b48a;margin:0 0 16px;letter-spacing:1.5px;}
.hero-range{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:15px;
  color:#e8ddc8;border:1px solid rgba(212,168,75,.4);border-radius:24px;padding:8px 22px;letter-spacing:1.5px;}

.preface{max-width:860px;margin:46px auto 10px;padding:0 28px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);letter-spacing:4px;margin:0 0 26px;font-weight:700;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 18px;text-align:justify;}

.toc-section{max-width:1100px;margin:40px auto 30px;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);letter-spacing:8px;margin:0 0 10px;font-weight:700;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:17px;color:var(--text-muted);letter-spacing:2px;margin:0 0 30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.toc-card{display:flex;gap:16px;align-items:flex-start;background:var(--card);
  border:1px solid var(--border);border-radius:12px;padding:20px 22px;cursor:pointer;
  transition:transform .2s,box-shadow .2s,border-color .2s;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(91,58,41,.14);border-color:var(--gold);}
.toc-num{flex:0 0 auto;width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  display:flex;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;
  font-size:20px;font-weight:700;box-shadow:0 2px 8px rgba(184,134,11,.35);}
.toc-text{flex:1;}
.toc-name{font-size:19.5px;font-weight:700;color:var(--accent);line-height:1.5;margin-bottom:6px;}
.toc-sub{font-family:"Noto Sans TC",sans-serif;font-size:14px;color:var(--text-muted);line-height:1.6;letter-spacing:.5px;}

.chapter{max-width:1000px;margin:30px auto 0;padding:0 24px;}
.ch-head{background:var(--headGrad);color:#f7f3ec;text-align:center;
  padding:40px 28px 34px;border-radius:14px 14px 0 0;position:relative;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;color:var(--goldL);letter-spacing:4px;margin-bottom:12px;}
.ch-name{font-size:34px;font-weight:900;color:#f3e6c8;margin:0 0 12px;letter-spacing:3px;line-height:1.35;}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:17px;color:#cdb98e;letter-spacing:1.5px;line-height:1.6;}
.ch-head::after{content:"";display:block;width:80px;height:2px;background:var(--goldL);margin:20px auto 0;}
.ch-body{background:#fff;border:1px solid var(--border);border-top:0;
  border-radius:0 0 14px 14px;padding:30px 26px 34px;}

.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);border-radius:10px;
  padding:18px 24px;margin:0 0 26px;box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;

.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;}
.bridge strong{color:var(--accent-red);font-weight:700;}

.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;min-height:180px;}

.next-link{display:inline-flex;align-items:center;gap:8px;margin-top:6px;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;color:var(--accent);

  transition:background .2s,color .2s;}
.next-link:hover{background:var(--gold);color:#fff;}

.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
  background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;

.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

#backTop{position:fixed;right:22px;bottom:22px;width:46px;height:46px;border-radius:50%;
  background:#2a2218;color:var(--gold);border:1px solid rgba(184,134,11,.4);font-size:20px;
  cursor:pointer;display:none;align-items:center;justify-content:center;z-index:120;}
#backTop.show{display:flex;}

.site-footer{text-align:center;padding:40px 28px 56px;margin-top:40px;
  color:var(--text-muted);font-family:"Noto Sans TC",sans-serif;font-size:15px;letter-spacing:1.5px;
  border-top:1px solid var(--border);background:#f1ead9;}

@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .hero-title{font-size:38px;}
  .ch-name{font-size:26px;}
  .toc-grid{grid-template-columns:1fr;}
}

<script>
function $(s,c){return (c||document).querySelector(s);}
function $all(s,c){return Array.prototype.slice.call((c||document).querySelectorAll(s));}

// 漢堡選單
var sbToggle=$('#sbToggle'),sb=$('#sb');
if(sbToggle){sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});}

// sticky 卷名回頂
var sbBrand=$('#sbBrand');
if(sbBrand){sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});}

// 側欄 / TOC 跳轉
$all('[data-ch]').forEach(function(it){
  it.addEventListener('click',function(){
    var n=it.getAttribute('data-ch');
    var el=document.getElementById('ch-'+n);
    if(!el) return;
    resizeAllFrames();
    setTimeout(function(){
      resizeAllFrames();
      var rect=el.getBoundingClientRect();
      window.scrollTo({top:window.scrollY+rect.top-12,behavior:'smooth'});
      if(sb) sb.classList.remove('open');
    },60);
  });
});

// 進度膠囊
var rpFill=$('#rpFill'),rpPct=$('#rpPct'),bt=$('#backTop');
function updateProgress(){
  var shh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=shh>0?Math.min(100,Math.max(0,window.scrollY/shh*100)):0;
  if(rpFill) rpFill.style.width=pct+'%';
  if(rpPct) rpPct.textContent=Math.round(pct)+'%';
  if(bt){ if(window.scrollY>600) bt.classList.add('show'); else bt.classList.remove('show'); }
}
window.addEventListener('scroll',updateProgress,{passive:true});
if(bt) bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

// 接近頁尾淡出
(function(){
  var cap=$('#readProgress');
  if(!cap) return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var targets=[];
  var f1=$('[data-wy-notice="v2"]'); if(f1) targets.push(f1);
  var f2=$('.site-footer'); if(f2) targets.push(f2);
  if(!targets.length) return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      var any=entries.some(function(e){return e.isIntersecting;});setHide(any);
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){io.observe(t);});
  }else{
    var check=function(){var dh=document.documentElement.scrollHeight;var sbm=window.scrollY+window.innerHeight;setHide(dh-sbm<240);};
    window.addEventListener('scroll',check,{passive:true});check();
  }
})();

// iframe 自動高度（viewport / content 解耦）
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body) return;
    d.body.style.minHeight='0';d.body.style.height='auto';
    if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
    var h=d.body.scrollHeight;
    if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
  }catch(e){}
}
function resizeAllFrames(){
  $all('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){tries++;resizeFrame(f);if(tries<30) setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}
  else{f.addEventListener('load',tick);}
}
$all('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});

// 錨點點擊防錯跳（外層）
document.addEventListener('click',function(e){
  var a=e.target;while(a&&a.tagName!=='A') a=a.parentElement;
  if(!a) return;
  var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2) return;
  var id=h.substring(1);var el=document.getElementById(id);
  if(!el) return;
  e.preventDefault();resizeAllFrames();
  setTimeout(function(){resizeAllFrames();var rect=el.getBoundingClientRect();window.scrollTo({top:window.scrollY+rect.top-20,behavior:'smooth'});},60);
},true);

// 持續輪詢確保定稿
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50) clearInterval(_riv);},300);

// 側欄 active 高亮
function highlightNav(){
  var chs=$all('.chapter');var actN=null;
  chs.forEach(function(c){
    if(c.getBoundingClientRect().top<window.innerHeight*0.35) actN=c.id.replace('ch-','');
  });
  $all('.sb-item').forEach(function(it){
    it.classList.toggle('active',it.getAttribute('data-ch')===actN);
  });
}
window.addEventListener('scroll',highlightNav,{passive:true});
highlightNav();updateProgress();

// 外層防複製
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-98-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
</body>
